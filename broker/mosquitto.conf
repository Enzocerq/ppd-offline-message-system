# Configuração do broker MQTT (MOM) para a demo do Projeto Final.
# Sobe com:  & "C:\Program Files\mosquitto\mosquitto.exe" -c broker\mosquitto.conf -v

listener 1883 0.0.0.0
allow_anonymous true

# Persistência: as filas offline são mensagens RETIDAS. Com persistência ligada,
# as filas sobrevivem a um reinício do broker.
persistence true
persistence_location broker/
